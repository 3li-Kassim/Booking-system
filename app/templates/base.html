<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %} {% endblock %} </title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static',filename='style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="{{url_for('static', filename='script.js')}}"></script>
</head>

<body>

    <div id="nav">
        <div id="top-nav">
            <h2>Reservio</h2>
            <ul>
                {% if current_user.is_authenticated %}
                <li><a href="{{url_for('auth.logout')}}" class="auth">Logout</a></li>
                {% else %}
                <li><a href="{{url_for('auth.register')}}" class="auth">Register</a></li>
                <li><a href="{{url_for('auth.login')}}" class="auth">Login</a></li>
                {% endif %}
                {% if current_user.is_authenticated and current_user.role == "admin" %}
                <li><a href="{{url_for('admin.admin_page')}}" class="auth">Admin</a></li>
                {% endif %}
            </ul>
        </div>
        <div id="bottom-nav">
        <ul>
            <li><a href="{{url_for('booking.dashboard')}}" id="booking">My Bookings</a></li>
        </ul> 
        </div>


    </div>
    <div id="center-base">
        {% block content %}{% endblock %}

    </div>

    

</body>

</html>
